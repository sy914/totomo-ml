<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Totomo · ML Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700&family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#0c0c0c;--s1:#141414;--s2:#1c1c1c;--s3:#242424;
  --b0:rgba(255,255,255,0.05);--b1:rgba(255,255,255,0.09);--b2:rgba(255,255,255,0.15);
  --text:#efefef;--muted:#888;--dim:#444;
  --accent:#ffe500;
  --green:#3ddc84;--green-d:rgba(61,220,132,0.12);--green-b:rgba(61,220,132,0.25);
  --amber:#ffb830;--amber-d:rgba(255,184,48,0.1);--amber-b:rgba(255,184,48,0.25);
  --red:#ff5252;--red-d:rgba(255,82,82,0.1);--red-b:rgba(255,82,82,0.25);
  --blue:#5b9cf6;--blue-d:rgba(91,156,246,0.1);--blue-b:rgba(91,156,246,0.25);
  --r:10px;--r-sm:6px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;font-size:14px;line-height:1.5;min-height:100vh}
.topbar{position:sticky;top:0;z-index:200;background:rgba(12,12,12,0.92);backdrop-filter:blur(12px);border-bottom:1px solid var(--b1);height:52px;display:flex;align-items:center;justify-content:space-between;padding:0 24px}
.brand{display:flex;align-items:center;gap:10px}
.brand-mark{width:30px;height:30px;border-radius:7px;background:var(--accent);display:flex;align-items:center;justify-content:center;font-family:'Syne',sans-serif;font-weight:700;font-size:14px;color:#000}
.brand-name{font-family:'Syne',sans-serif;font-weight:600;font-size:15px}
.brand-sep{color:var(--dim);margin:0 2px}
.brand-sub{font-size:12px;color:var(--muted)}
.topbar-right{display:flex;align-items:center;gap:10px}
.sync-time{font-family:'DM Mono',monospace;font-size:11px;color:var(--dim)}
.status-chip{display:flex;align-items:center;gap:5px;font-family:'DM Mono',monospace;font-size:11px;padding:4px 10px;border-radius:20px;border:1px solid var(--b1);color:var(--muted);transition:all 0.3s}
.status-chip .dot{width:6px;height:6px;border-radius:50%;background:var(--dim);flex-shrink:0}
.status-chip.ok{border-color:var(--green-b);color:var(--green)}
.status-chip.ok .dot{background:var(--green);box-shadow:0 0 8px var(--green)}
.status-chip.loading{border-color:var(--amber-b);color:var(--amber)}
.status-chip.loading .dot{background:var(--amber);animation:pulse 1s infinite}
.status-chip.error{border-color:var(--red-b);color:var(--red)}
.status-chip.error .dot{background:var(--red)}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.2}}
.btn{background:transparent;border:1px solid var(--b2);color:var(--text);padding:6px 14px;border-radius:var(--r-sm);font-family:'DM Sans',sans-serif;font-size:12px;font-weight:500;cursor:pointer;transition:background 0.15s}
.btn:hover{background:var(--s2)}
.btn:disabled{opacity:0.3;cursor:not-allowed}
.nav{display:flex;gap:4px;padding:14px 24px 0;border-bottom:1px solid var(--b0);background:var(--bg);position:sticky;top:52px;z-index:100}
.tab{font-size:12px;font-weight:500;padding:8px 14px;border-radius:var(--r-sm) var(--r-sm) 0 0;cursor:pointer;color:var(--muted);border:1px solid transparent;border-bottom:none;transition:all 0.15s;background:transparent;font-family:'DM Sans',sans-serif}
.tab:hover{color:var(--text)}
.tab.active{color:var(--text);background:var(--s1);border-color:var(--b1)}
.page{display:none;padding:24px;max-width:960px;margin:0 auto}
.page.active{display:block}
.metrics{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:10px;margin-bottom:22px}
.mc{background:var(--s1);border:1px solid var(--b0);border-radius:var(--r);padding:14px 16px;transition:border-color 0.2s}
.mc:hover{border-color:var(--b1)}
.mc-label{font-size:10px;text-transform:uppercase;letter-spacing:0.07em;color:var(--muted);font-family:'DM Mono',monospace;margin-bottom:6px}
.mc-val{font-size:24px;font-weight:500;font-family:'Syne',sans-serif;color:var(--text);font-variant-numeric:tabular-nums}
.mc-val.g{color:var(--green)}.mc-val.a{color:var(--amber)}.mc-val.r{color:var(--red)}
.mc-sub{font-size:11px;color:var(--dim);margin-top:3px}
.sk{height:26px;width:50px;background:var(--s3);border-radius:4px;animation:sh 1.2s ease infinite}
@keyframes sh{0%,100%{opacity:0.5}50%{opacity:1}}
.sec-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.sec-title{font-size:10px;text-transform:uppercase;letter-spacing:0.07em;color:var(--dim);font-family:'DM Mono',monospace}
.sec-count{font-size:11px;color:var(--dim);font-family:'DM Mono',monospace}
.alert{display:flex;align-items:flex-start;gap:10px;padding:10px 14px;border-radius:var(--r-sm);font-size:13px;margin-bottom:6px;border:1px solid transparent}
.alert.danger{background:var(--red-d);border-color:var(--red-b);color:var(--red)}
.alert.warn{background:var(--amber-d);border-color:var(--amber-b);color:var(--amber)}
.alert.info{background:var(--blue-d);border-color:var(--blue-b);color:var(--blue)}
.alert.ok{background:var(--green-d);border-color:var(--green-b);color:var(--green)}
.alert-icon{font-size:13px;flex-shrink:0;margin-top:1px;font-family:'DM Mono',monospace}
.listing{background:var(--s1);border:1px solid var(--b0);border-radius:var(--r);padding:18px 20px;margin-bottom:10px;transition:border-color 0.2s}
.listing:hover{border-color:var(--b1)}
.listing-top{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;margin-bottom:14px}
.listing-name{font-size:14px;font-weight:500;color:var(--text);margin-bottom:4px;line-height:1.35}
.listing-id{font-size:10px;font-family:'DM Mono',monospace;color:var(--dim)}
.badges{display:flex;gap:5px;flex-wrap:wrap;justify-content:flex-end;flex-shrink:0}
.badge{font-size:10px;font-weight:500;padding:3px 8px;border-radius:20px;border:1px solid transparent;white-space:nowrap;font-family:'DM Mono',monospace}
.badge.active{background:var(--green-d);border-color:var(--green-b);color:var(--green)}
.badge.paused{background:var(--amber-d);border-color:var(--amber-b);color:var(--amber)}
.badge.closed{background:var(--red-d);border-color:var(--red-b);color:var(--red)}
.badge.premium{background:rgba(167,139,250,0.1);border-color:rgba(167,139,250,0.25);color:#a78bfa}
.badge.classic{background:var(--s3);border-color:var(--b1);color:var(--muted)}
.listing-stats{display:grid;grid-template-columns:repeat(5,minmax(0,1fr));gap:8px;padding:12px 0;border-top:1px solid var(--b0);border-bottom:1px solid var(--b0);margin-bottom:12px}
.stat{text-align:center}
.sv{font-size:15px;font-weight:500;color:var(--text);font-variant-numeric:tabular-nums;font-family:'Syne',sans-serif}
.sv.a{color:var(--amber)}.sv.r{color:var(--red)}
.sl{font-size:9px;color:var(--dim);margin-top:2px;text-transform:uppercase;letter-spacing:0.05em}
.bar-bg{background:var(--s3);border-radius:2px;height:3px;margin-top:5px;overflow:hidden}
.bar{height:3px;border-radius:2px;background:var(--green);transition:width 0.4s}
.bar.a{background:var(--amber)}.bar.r{background:var(--red)}
.health-row{display:flex;gap:5px;flex-wrap:wrap}
.hp{font-size:10px;font-family:'DM Mono',monospace;padding:2px 7px;border-radius:20px;border:1px solid var(--b0);color:var(--dim)}
.hp.ok{background:var(--green-d);border-color:var(--green-b);color:var(--green)}
.hp.warn{background:var(--amber-d);border-color:var(--amber-b);color:var(--amber)}
.hp.bad{background:var(--red-d);border-color:var(--red-b);color:var(--red)}
.q-card{background:var(--s1);border:1px solid var(--b0);border-radius:var(--r);padding:16px 20px;margin-bottom:8px}
.q-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;flex-wrap:wrap;gap:6px}
.q-product{font-size:11px;font-family:'DM Mono',monospace;color:var(--muted)}
.q-date{font-size:10px;color:var(--dim)}
.q-status{font-size:10px;font-family:'DM Mono',monospace;padding:2px 7px;border-radius:20px;border:1px solid transparent}
.q-status.unanswered{background:var(--amber-d);border-color:var(--amber-b);color:var(--amber)}
.q-status.answered{background:var(--green-d);border-color:var(--green-b);color:var(--green)}
.q-text{font-size:13px;color:var(--text);margin-bottom:6px;line-height:1.5}
.q-answer{font-size:12px;color:var(--muted);padding-left:12px;border-left:2px solid var(--b2);line-height:1.5}
.order-card{background:var(--s1);border:1px solid var(--b0);border-radius:var(--r);padding:16px 20px;margin-bottom:8px;display:grid;grid-template-columns:1fr auto;align-items:center;gap:16px}
.order-title{font-size:13px;font-weight:500;color:var(--text);margin-bottom:3px}
.order-meta{font-size:11px;color:var(--muted);font-family:'DM Mono',monospace}
.order-right{text-align:right}
.order-amount{font-size:16px;font-weight:500;font-family:'Syne',sans-serif;color:var(--text)}
.order-status-badge{font-size:10px;font-family:'DM Mono',monospace;padding:2px 7px;border-radius:20px;margin-top:4px;display:inline-block;border:1px solid transparent}
.order-status-badge.paid{background:var(--green-d);border-color:var(--green-b);color:var(--green)}
.order-status-badge.pending{background:var(--amber-d);border-color:var(--amber-b);color:var(--amber)}
.order-status-badge.cancelled{background:var(--red-d);border-color:var(--red-b);color:var(--red)}
.chart-wrap{background:var(--s1);border:1px solid var(--b0);border-radius:var(--r);padding:18px 20px;margin-bottom:10px}
.chart-title{font-size:10px;text-transform:uppercase;letter-spacing:0.07em;color:var(--dim);font-family:'DM Mono',monospace;margin-bottom:14px}
.bar-chart{display:flex;align-items:flex-end;gap:6px;height:80px}
.bc-col{display:flex;flex-direction:column;align-items:center;flex:1;gap:3px}
.bc-bar{width:100%;border-radius:3px 3px 0 0;background:var(--blue);min-height:2px;transition:height 0.4s}
.bc-bar.accent{background:var(--accent)}
.bc-lbl{font-size:9px;color:var(--dim);font-family:'DM Mono',monospace;white-space:nowrap}
.bc-val{font-size:9px;color:var(--muted);font-family:'DM Mono',monospace}
.grid2{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:10px;margin-bottom:10px}
.empty{text-align:center;padding:50px 0;color:var(--dim);font-size:13px}
.error-card{background:var(--red-d);border:1px solid var(--red-b);border-radius:var(--r);padding:18px 22px;color:var(--red)}
.error-card strong{display:block;margin-bottom:6px;font-size:14px}
.error-card p{font-size:12px;opacity:0.8}
.rep-bar-bg{background:var(--s3);border-radius:4px;height:6px;overflow:hidden;margin-top:6px}
.rep-bar-fill{height:6px;border-radius:4px;background:linear-gradient(90deg,var(--red),var(--amber),var(--green));transition:width 0.5s}
.rep-labels{display:flex;justify-content:space-between;font-size:9px;color:var(--dim);margin-top:3px;font-family:'DM Mono',monospace}
.fade-in{animation:fadein 0.3s ease}
@keyframes fadein{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
hr.div{border:none;border-top:1px solid var(--b0);margin:16px 0}
.date-bar{display:flex;align-items:center;gap:8px;padding:10px 24px;background:var(--s1);border-bottom:1px solid var(--b0);flex-wrap:wrap;position:sticky;top:104px;z-index:90}
.range-btn{font-size:12px;font-weight:500;font-family:'DM Sans',sans-serif;padding:5px 12px;border-radius:20px;cursor:pointer;border:1px solid var(--b1);color:var(--muted);background:transparent;transition:all 0.15s;white-space:nowrap}
.range-btn:hover{color:var(--text);border-color:var(--b2)}
.range-btn.active{background:var(--accent);color:#000;border-color:var(--accent);font-weight:600}
.custom-wrap{display:none;align-items:center;gap:6px;flex-wrap:wrap}
.custom-wrap.show{display:flex}
.date-input{background:var(--s2);border:1px solid var(--b1);color:var(--text);padding:4px 10px;border-radius:var(--r-sm);font-size:12px;font-family:'DM Mono',monospace}
.date-input:focus{outline:none;border-color:var(--b2)}
.apply-btn{font-size:12px;font-weight:600;padding:5px 12px;border-radius:20px;background:var(--accent);color:#000;border:none;cursor:pointer;font-family:'DM Sans',sans-serif}
.range-label{font-size:10px;font-family:'DM Mono',monospace;color:var(--dim);margin-left:auto;white-space:nowrap}
@media(max-width:640px){
  .metrics{grid-template-columns:repeat(2,minmax(0,1fr))}
  .listing-stats{grid-template-columns:repeat(3,minmax(0,1fr))}
  .grid2{grid-template-columns:1fr}
  .topbar{padding:0 14px}
  .page{padding:16px 14px}
  .nav{padding:10px 14px 0;overflow-x:auto}
  .sync-time{display:none}
}
</style>
</head>
<body>

<div class="topbar">
  <div class="brand">
    <div class="brand-mark">T</div>
    <span class="brand-name">Totomo</span>
    <span class="brand-sep">/</span>
    <span class="brand-sub">Mercado Libre UY</span>
  </div>
  <div class="topbar-right">
    <span class="sync-time" id="syncTime">—</span>
    <div class="status-chip loading" id="chip">
      <div class="dot"></div>
      <span id="chipLabel">Conectando…</span>
    </div>
    <button class="btn" id="refreshBtn" onclick="init()">↺ Actualizar</button>
  </div>
</div>

<div class="nav">
  <button class="tab active" onclick="showTab('overview')">Resumen</button>
  <button class="tab" onclick="showTab('listings')">Publicaciones</button>
  <button class="tab" onclick="showTab('questions')">Preguntas <span id="qBadge"></span></button>
  <button class="tab" onclick="showTab('orders')">Ventas</button>
  <button class="tab" onclick="showTab('account')">Cuenta</button>
</div>

<div class="date-bar">
  <button class="range-btn" onclick="setRange('today')">Hoy</button>
  <button class="range-btn active" id="btn-week" onclick="setRange('week')">Esta semana</button>
  <button class="range-btn" id="btn-month" onclick="setRange('month')">Este mes</button>
  <button class="range-btn" id="btn-custom" onclick="setRange('custom')">Personalizado</button>
  <div class="custom-wrap" id="customWrap">
    <input type="date" class="date-input" id="dateFrom">
    <span style="color:var(--dim);font-size:12px">→</span>
    <input type="date" class="date-input" id="dateTo">
    <button class="apply-btn" onclick="applyCustom()">Aplicar</button>
  </div>
  <span class="range-label" id="rangeLabel">últimos 7 días</span>
</div>

<div class="page active" id="tab-overview">
  <div class="metrics" id="metricsRow">
    <div class="mc"><div class="mc-label">Publicaciones</div><div class="sk"></div></div>
    <div class="mc"><div class="mc-label">Activas</div><div class="sk"></div></div>
    <div class="mc"><div class="mc-label">Visitas 30d</div><div class="sk"></div></div>
    <div class="mc"><div class="mc-label">Ingresos 30d</div><div class="sk"></div></div>
  </div>
  <div class="sec-head"><span class="sec-title">Alertas</span><span class="sec-count" id="alertCount">—</span></div>
  <div id="alertsBlock"></div>
  <hr class="div">
  <div class="grid2" id="chartsBlock"></div>
</div>

<div class="page" id="tab-listings">
  <div class="sec-head"><span class="sec-title">Publicaciones</span><span class="sec-count" id="listCount">—</span></div>
  <div id="listingsBlock"></div>
</div>

<div class="page" id="tab-questions">
  <div class="sec-head"><span class="sec-title">Preguntas recientes</span><span class="sec-count" id="questCount">—</span></div>
  <div id="questionsBlock"></div>
</div>

<div class="page" id="tab-orders">
  <div class="metrics" id="orderMetrics">
    <div class="mc"><div class="mc-label">Ventas 30d</div><div class="sk"></div></div>
    <div class="mc"><div class="mc-label">Ingresos 30d</div><div class="sk"></div></div>
    <div class="mc"><div class="mc-label">Ticket promedio</div><div class="sk"></div></div>
    <div class="mc"><div class="mc-label">Cancelaciones</div><div class="sk"></div></div>
  </div>
  <div class="sec-head"><span class="sec-title">Órdenes recientes</span><span class="sec-count" id="ordersCount">—</span></div>
  <div id="ordersBlock"></div>
</div>

<div class="page" id="tab-account">
  <div id="accountBlock"></div>
</div>

<script>
const fmt = n => (n||0).toLocaleString('es-UY');
const fmtUYU = n => `UYU ${fmt(Math.round(n||0))}`;
const fmtDate = s => s ? new Date(s).toLocaleDateString('es-UY',{day:'2-digit',month:'short',hour:'2-digit',minute:'2-digit'}) : '—';
const trunc = (s,n) => s&&s.length>n ? s.slice(0,n)+'…' : (s||'');
const toISO = d => d.toISOString().split('T')[0];

let DATA = {};
let RANGE = { key: 'week', from: null, to: null };

function getRangeDates(key) {
  const now = new Date();
  const today = new Date(now.getFullYear(), now.getMonth(), now.getDate());
  if (key === 'today') {
    return { from: toISO(today), to: toISO(new Date(today.getTime() + 86400000 - 1)), label: 'hoy' };
  }
  if (key === 'week') {
    const mon = new Date(today); mon.setDate(today.getDate() - today.getDay() + (today.getDay()===0?-6:1));
    return { from: toISO(mon), to: toISO(new Date(today.getTime() + 86400000 - 1)), label: 'esta semana' };
  }
  if (key === 'month') {
    const first = new Date(today.getFullYear(), today.getMonth(), 1);
    return { from: toISO(first), to: toISO(new Date(today.getTime() + 86400000 - 1)), label: 'este mes' };
  }
  return null;
}

function setRange(key) {
  document.querySelectorAll('.range-btn').forEach(b => b.classList.remove('active'));
  document.getElementById(`btn-${key}`)?.classList.add('active');
  const cw = document.getElementById('customWrap');
  if (key === 'custom') {
    cw.classList.add('show');
    const today = toISO(new Date());
    const weekAgo = toISO(new Date(Date.now() - 7*86400000));
    document.getElementById('dateFrom').value = weekAgo;
    document.getElementById('dateTo').value = today;
    RANGE = { key: 'custom', from: weekAgo, to: today };
    document.getElementById('rangeLabel').textContent = `${weekAgo} → ${today}`;
    return;
  }
  cw.classList.remove('show');
  const dates = getRangeDates(key);
  RANGE = { key, from: dates.from, to: dates.to };
  document.getElementById('rangeLabel').textContent = dates.label;
  init();
}

function applyCustom() {
  const from = document.getElementById('dateFrom').value;
  const to = document.getElementById('dateTo').value;
  if (!from || !to) return;
  RANGE = { key: 'custom', from, to };
  document.getElementById('rangeLabel').textContent = `${from} → ${to}`;
  init();
}

// Inicializar botones con IDs
function fixRangeBtns() {
  const btns = document.querySelectorAll('.range-btn');
  const keys = ['today','week','month','custom'];
  btns.forEach((b, i) => { if (!b.id) b.id = `btn-${keys[i]}`; });
}

function setStatus(state, label) {
  const c = document.getElementById('chip');
  c.className = `status-chip ${state}`;
  document.getElementById('chipLabel').textContent = label;
}

function showTab(id) {
  document.querySelectorAll('.tab').forEach((t,i) => {
    t.classList.toggle('active', ['overview','listings','questions','orders','account'][i] === id);
  });
  document.querySelectorAll('.page').forEach(p => {
    p.classList.toggle('active', p.id === `tab-${id}`);
  });
}

function stockCls(q){return q===0?'r':q<=2?'a':''}
function barCls(q){return q===0?'r':q<=2?'a':''}
function barPct(q){return typeof q==='number'?Math.min(Math.round(q/10*100),100):0}

function healthPills(item) {
  const f=item.pictures?.length||0, a=item.attributes?.length||0, d=!!item.description;
  return `<div class="health-row">
    <span class="hp ${f>=5?'ok':f>=3?'warn':'bad'}">fotos: ${f}</span>
    <span class="hp ${a>=5?'ok':'warn'}">attr: ${a}</span>
    <span class="hp ${d?'ok':'bad'}">desc: ${d?'sí':'no'}</span>
  </div>`;
}

function typeBadge(t){return t==='gold_premium'?'<span class="badge premium">Premium</span>':'<span class="badge classic">Clásica</span>'}
function statusBadge(s){
  if(s==='active') return '<span class="badge active">activa</span>';
  if(s==='paused') return '<span class="badge paused">pausada</span>';
  return '<span class="badge closed">cerrada</span>';
}

function renderListing(item, visits) {
  const vis=visits?.results?.reduce((a,b)=>a+(b.total||0),0)||0;
  const stock=item.available_quantity;
  const sc=stockCls(stock), bc=barCls(stock);
  return `<div class="listing fade-in">
    <div class="listing-top">
      <div>
        <div class="listing-name">${item.title}</div>
        <div class="listing-id">ID: ${item.id} · SKU: ${item.seller_custom_field||'—'}</div>
      </div>
      <div class="badges">${statusBadge(item.status)}${typeBadge(item.listing_type_id)}</div>
    </div>
    <div class="listing-stats">
      <div class="stat"><div class="sv">${item.price?fmtUYU(item.price):'—'}</div><div class="sl">Precio</div></div>
      <div class="stat">
        <div class="sv ${sc}">${typeof stock==='number'?stock:'—'}</div>
        <div class="sl">Stock</div>
        ${typeof stock==='number'?`<div class="bar-bg"><div class="bar ${bc}" style="width:${barPct(stock)}%"></div></div>`:''}
      </div>
      <div class="stat"><div class="sv">${fmt(item.sold_quantity)}</div><div class="sl">Vendidos</div></div>
      <div class="stat"><div class="sv">${fmt(vis)}</div><div class="sl">Visitas 30d</div></div>
      <div class="stat"><div class="sv">${item.listing_type_id==='gold_premium'?'17.5%':'12%'}</div><div class="sl">Comisión</div></div>
    </div>
    ${healthPills(item)}
  </div>`;
}

function buildAlerts(items, questions) {
  const alerts=[];
  for(const item of items){
    const n=trunc(item.title,45);
    if(item.available_quantity===0) alerts.push({type:'danger',icon:'▲',msg:`Sin stock: "${n}"`});
    else if(item.available_quantity<=2) alerts.push({type:'warn',icon:'◆',msg:`Stock bajo (${item.available_quantity} ud.): "${n}"`});
    if(item.status==='paused') alerts.push({type:'warn',icon:'⏸',msg:`Publicación pausada: "${n}"`});
    if(!item.description) alerts.push({type:'info',icon:'●',msg:`Sin descripción: "${n}"`});
    if((item.pictures?.length||0)<5) alerts.push({type:'info',icon:'●',msg:`Pocas fotos (${item.pictures?.length||0}): "${n}"`});
  }
  const unanswered=questions.filter(q=>q.status==='UNANSWERED').length;
  if(unanswered>0) alerts.unshift({type:'warn',icon:'?',msg:`${unanswered} pregunta${unanswered>1?'s':''} sin responder`});
  return alerts;
}

function renderVisitsChart(items, visitsMap) {
  const data=items.map(item=>({
    label:trunc(item.title.split(' ')[0],8),
    val:visitsMap[item.id]?.results?.reduce((a,b)=>a+(b.total||0),0)||0
  }));
  const max=Math.max(...data.map(d=>d.val),1);
  return `<div class="chart-wrap">
    <div class="chart-title">Visitas por publicación (30d)</div>
    <div class="bar-chart">${data.map(d=>`
      <div class="bc-col">
        <div class="bc-val">${d.val}</div>
        <div class="bc-bar" style="height:${Math.round(d.val/max*70)}px"></div>
        <div class="bc-lbl">${d.label}</div>
      </div>`).join('')}
    </div>
  </div>`;
}

function renderSalesChart(orders) {
  const byDay={};
  const days=['dom','lun','mar','mié','jue','vie','sáb'];
  for(let i=6;i>=0;i--){
    const d=new Date(Date.now()-i*86400000);
    byDay[days[d.getDay()]+(i===0?' hoy':'')] = 0;
  }
  orders.forEach(o=>{
    if(o.status==='paid'||o.status==='delivered'||o.status==='payment_done'){
      const d=new Date(o.date_created);
      const diff=Math.floor((Date.now()-d.getTime())/86400000);
      if(diff<7){
        const key=days[d.getDay()]+(diff===0?' hoy':'');
        if(byDay[key]!==undefined) byDay[key]+=(o.total_amount||0);
      }
    }
  });
  const vals=Object.values(byDay), keys=Object.keys(byDay);
  const max=Math.max(...vals,1);
  return `<div class="chart-wrap">
    <div class="chart-title">Ingresos últimos 7 días (UYU)</div>
    <div class="bar-chart">${keys.map((k,i)=>`
      <div class="bc-col">
        <div class="bc-val">${vals[i]>0?fmt(Math.round(vals[i])):''}</div>
        <div class="bc-bar accent" style="height:${Math.round(vals[i]/max*70)}px"></div>
        <div class="bc-lbl">${k}</div>
      </div>`).join('')}
    </div>
  </div>`;
}

function renderQuestion(q, itemTitle) {
  const answered=q.status==='ANSWERED';
  return `<div class="q-card fade-in">
    <div class="q-header">
      <span class="q-product">${trunc(itemTitle||q.item_id,40)}</span>
      <div style="display:flex;align-items:center;gap:8px">
        <span class="q-date">${fmtDate(q.date_created)}</span>
        <span class="q-status ${answered?'answered':'unanswered'}">${answered?'respondida':'sin respuesta'}</span>
      </div>
    </div>
    <div class="q-text">${q.text}</div>
    ${answered&&q.answer?`<div class="q-answer">${q.answer.text}</div>`:''}
  </div>`;
}

function renderOrder(order) {
  const title=order.order_items?.[0]?.item?.title||'Producto';
  const qty=order.order_items?.[0]?.quantity||1;
  const buyer=order.buyer?.nickname||'—';
  const map={paid:'paid',delivered:'paid',payment_done:'paid',payment_in_process:'pending',pending:'pending',cancelled:'cancelled'};
  const labels={paid:'pagada',delivered:'entregada',payment_done:'pago confirmado',payment_in_process:'pago en proceso',pending:'pendiente',cancelled:'cancelada'};
  const cls=map[order.status]||'pending';
  return `<div class="order-card fade-in">
    <div>
      <div class="order-title">${trunc(title,50)}</div>
      <div class="order-meta">${fmtDate(order.date_created)} · ${qty} ud. · ${buyer}</div>
    </div>
    <div class="order-right">
      <div class="order-amount">${fmtUYU(order.total_amount)}</div>
      <span class="order-status-badge ${cls}">${labels[order.status]||order.status}</span>
    </div>
  </div>`;
}

function renderAccount(user) {
  const rep=user.seller_reputation||{};
  const lvl=rep.level_id||'—';
  const lvlMap={'1_red':10,'2_orange':30,'3_yellow':55,'4_light_green':75,'5_green':95};
  const pct=lvlMap[lvl]||0;
  const lvlLabel={'1_red':'Rojo','2_orange':'Naranja','3_yellow':'Amarillo','4_light_green':'Verde claro','5_green':'Verde'};
  const sales=rep.transactions?.completed||0;
  const cancelled=rep.transactions?.canceled||0;
  const delayed=rep.metrics?.delayed_handling_time?.rate||0;
  const complaints=rep.metrics?.claims?.rate||0;
  return `<div class="grid2">
    <div class="mc" style="background:var(--s1);border:1px solid var(--b0);border-radius:var(--r);padding:18px 20px">
      <div class="mc-label">Usuario</div>
      <div class="mc-val" style="font-size:18px;margin-top:6px">${user.nickname}</div>
      <div class="mc-sub">ID: ${user.id} · ${user.country_id}</div>
    </div>
    <div class="mc" style="background:var(--s1);border:1px solid var(--b0);border-radius:var(--r);padding:18px 20px">
      <div class="mc-label">Reputación</div>
      <div class="mc-val" style="font-size:18px;margin-top:6px">${lvlLabel[lvl]||'—'}</div>
      <div class="rep-bar-bg"><div class="rep-bar-fill" style="width:${pct}%"></div></div>
      <div class="rep-labels"><span>Rojo</span><span>Verde</span></div>
    </div>
  </div>
  <div class="metrics" style="margin-top:0">
    <div class="mc"><div class="mc-label">Ventas completadas</div><div class="mc-val g">${fmt(sales)}</div></div>
    <div class="mc"><div class="mc-label">Cancelaciones</div><div class="mc-val ${cancelled>0?'a':''}">${fmt(cancelled)}</div></div>
    <div class="mc"><div class="mc-label">Envíos demorados</div><div class="mc-val ${delayed>0.05?'r':delayed>0.02?'a':'g'}">${(delayed*100).toFixed(1)}%</div></div>
    <div class="mc"><div class="mc-label">Reclamos</div><div class="mc-val ${complaints>0.02?'r':'g'}">${(complaints*100).toFixed(1)}%</div></div>
  </div>`;
}

function renderAll() {
  const {user,items,visitsMap,questions,orders,visitDays}=DATA;
  const active=items.filter(x=>x.status==='active').length;
  const totalVis=Object.values(visitsMap).reduce((a,v)=>a+(v?.results?.reduce((x,y)=>x+(y.total||0),0)||0),0);
  const rangeLabel=document.getElementById('rangeLabel').textContent;

  // Filtrar órdenes por rango seleccionado
  const fromMs = RANGE.from ? new Date(RANGE.from).getTime() : 0;
  const toMs   = RANGE.to   ? new Date(RANGE.to).getTime() + 86400000 : Date.now();
  const ordersInRange=orders.filter(o=>{
    const t=new Date(o.date_created).getTime();
    return t>=fromMs && t<=toMs;
  });
  const paidInRange=ordersInRange.filter(o=>o.status==='paid'||o.status==='delivered'||o.status==='payment_done');
  const revenue=paidInRange.reduce((a,o)=>a+(o.total_amount||0),0);

  document.getElementById('metricsRow').innerHTML=`
    <div class="mc"><div class="mc-label">Publicaciones</div><div class="mc-val">${items.length}</div></div>
    <div class="mc"><div class="mc-label">Activas</div><div class="mc-val ${active===items.length?'g':'a'}">${active}/${items.length}</div></div>
    <div class="mc"><div class="mc-label">Visitas (${visitDays||30}d)</div><div class="mc-val">${fmt(totalVis)}</div></div>
    <div class="mc"><div class="mc-label">Ingresos (${rangeLabel})</div><div class="mc-val">${fmtUYU(revenue)}</div></div>`;

  const alerts=buildAlerts(items,questions);
  const unanswered=questions.filter(q=>q.status==='UNANSWERED').length;
  document.getElementById('qBadge').textContent=unanswered>0?`(${unanswered})`:'';
  document.getElementById('alertCount').textContent=`${alerts.length} activas`;
  document.getElementById('alertsBlock').innerHTML=alerts.length===0
    ?'<div class="alert ok"><span class="alert-icon">✓</span><span>Sin alertas — todo en orden.</span></div>'
    :alerts.map(a=>`<div class="alert ${a.type} fade-in"><span class="alert-icon">${a.icon}</span><span>${a.msg}</span></div>`).join('');

  document.getElementById('chartsBlock').innerHTML=renderVisitsChart(items,visitsMap)+renderSalesChart(ordersInRange);

  document.getElementById('listCount').textContent=`${items.length} total`;
  document.getElementById('listingsBlock').innerHTML=items.length===0
    ?'<div class="empty">No se encontraron publicaciones.</div>'
    :items.map(item=>renderListing(item,visitsMap[item.id])).join('');

  const itemMap={};
  items.forEach(i=>{itemMap[i.id]=i.title});
  document.getElementById('questCount').textContent=`${questions.length} recientes`;
  document.getElementById('questionsBlock').innerHTML=questions.length===0
    ?'<div class="empty">No hay preguntas recientes.</div>'
    :questions.map(q=>renderQuestion(q,itemMap[q.item_id])).join('');

  const cancelled=ordersInRange.filter(o=>o.status==='cancelled').length;
  const avgTicket=paidInRange.length>0?paidInRange.reduce((a,o)=>a+(o.total_amount||0),0)/paidInRange.length:0;

  document.getElementById('orderMetrics').innerHTML=`
    <div class="mc"><div class="mc-label">Ventas (${rangeLabel})</div><div class="mc-val g">${paidInRange.length}</div></div>
    <div class="mc"><div class="mc-label">Ingresos</div><div class="mc-val">${fmtUYU(revenue)}</div></div>
    <div class="mc"><div class="mc-label">Ticket promedio</div><div class="mc-val">${fmtUYU(avgTicket)}</div></div>
    <div class="mc"><div class="mc-label">Cancelaciones</div><div class="mc-val ${cancelled>0?'a':'g'}">${cancelled}</div></div>`;
  document.getElementById('ordersCount').textContent=`${ordersInRange.length} en el período`;
  document.getElementById('ordersBlock').innerHTML=ordersInRange.length===0
    ?'<div class="empty">No hay órdenes en este período.</div>'
    :ordersInRange.map(renderOrder).join('');

  document.getElementById('accountBlock').innerHTML=renderAccount(user);
}

async function init() {
  const btn=document.getElementById('refreshBtn');
  btn.disabled=true;
  setStatus('loading','Cargando…');
  try {
    let url='/.netlify/functions/ml';
    const params=new URLSearchParams();
    if(RANGE.from) params.set('date_from', RANGE.from);
    if(RANGE.to)   params.set('date_to',   RANGE.to);
    if([...params].length) url+=`?${params}`;
    const r=await fetch(url);
    const data=await r.json();
    if(data.error) throw new Error(data.error);
    DATA=data;
    renderAll();
    setStatus('ok', data.user?.nickname||'OK');
    document.getElementById('syncTime').textContent=`Sync: ${new Date().toLocaleTimeString('es-UY',{hour:'2-digit',minute:'2-digit'})}`;
  } catch(err) {
    setStatus('error','Error');
    const msg=`<div class="error-card"><strong>Error al conectar</strong><p>${err.message}</p></div>`;
    document.getElementById('alertsBlock').innerHTML=msg;
  } finally {
    btn.disabled=false;
  }
}

// Inicializar rango por defecto (esta semana)
const _initDates = getRangeDates('week');
RANGE = { key: 'week', from: _initDates.from, to: _initDates.to };
init();
setInterval(init, 5*60*1000);
</script>
